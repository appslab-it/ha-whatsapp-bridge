version: "3.8"

# Standalone testing — NOT used when running as HA addon.
# Use this to test WAHA locally before integrating with Home Assistant.

services:
  waha:
    image: devlikeapro/waha:latest
    container_name: waha-whatsapp
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_API_KEY: "changeme"
      WHATSAPP_DEFAULT_ENGINE: "NOWEB"
      WHATSAPP_HOOK_EVENTS: "message,session.status"
      WAHA_LOG_LEVEL: "INFO"
      # Uncomment to enable webhook forwarding to Home Assistant:
      # WHATSAPP_HOOK_URL: "http://homeassistant.local:8123/api/webhook/whatsapp"
    volumes:
      - waha_sessions:/app/sessions
      - waha_files:/app/files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  waha_sessions:
  waha_files:
