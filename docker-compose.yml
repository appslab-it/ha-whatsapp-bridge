services:
  waha:
    image: devlikeapro/waha:latest
    container_name: waha-whatsapp
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_DEFAULT_ENGINE: "NOWEB"
      WHATSAPP_API_KEY: "changeme"           # Cambia con la tua chiave segreta
      WAHA_DASHBOARD_USERNAME: "admin"
      WAHA_DASHBOARD_PASSWORD: "admin"
      WHATSAPP_START_SESSION: "default"
      WHATSAPP_HOOK_EVENTS: "message,session.status"
      WAHA_LOG_LEVEL: "INFO"
      # WHATSAPP_HOOK_URL: "http://homeassistant.local:8123/api/webhook/whatsapp"
    volumes:
      - ./data/sessions:/app/.sessions        # Sessioni WhatsApp (QR code pairing)
      - ./data/files:/app/files              # File ricevuti
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
