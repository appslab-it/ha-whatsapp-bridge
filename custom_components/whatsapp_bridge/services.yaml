send_message:
  name: Invia Messaggio
  description: Invia un messaggio WhatsApp di testo.
  fields:
    phone:
      name: Numero di telefono
      description: "Numero internazionale senza + (es. 393331234567)"
      required: true
      example: "393331234567"
      selector:
        text:
    message:
      name: Messaggio
      description: Testo del messaggio da inviare.
      required: true
      selector:
        text:
          multiline: true
    session_name:
      name: Nome Sessione
      description: "Sessione WAHA da usare (opzionale, usa quella predefinita se omessa)."
      required: false
      selector:
        text:

send_image:
  name: Invia Immagine
  description: Invia un'immagine WhatsApp con didascalia opzionale.
  fields:
    phone:
      name: Numero di telefono
      description: "Numero internazionale senza + (es. 393331234567)"
      required: true
      selector:
        text:
    url:
      name: URL Immagine
      description: URL dell'immagine da inviare.
      required: true
      selector:
        text:
    caption:
      name: Didascalia
      description: Testo opzionale da allegare all'immagine.
      required: false
      selector:
        text:
    session_name:
      name: Nome Sessione
      description: "Sessione WAHA da usare (opzionale)."
      required: false
      selector:
        text:

