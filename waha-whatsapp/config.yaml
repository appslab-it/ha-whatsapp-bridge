name: "WAHA WhatsApp"
description: "Send WhatsApp messages, photos, and videos from Home Assistant using WAHA (WhatsApp HTTP API)"
version: "1.0.1"
slug: "waha_whatsapp"
init: false
homeassistant: "2023.1.0"

arch:
  - amd64
  - aarch64

url: "https://github.com/appslab-it/waha-addon/tree/main/waha-whatsapp"

ports:
  3000/tcp: 3000

ports_description:
  3000/tcp: "WAHA REST API & Dashboard"

map:
  - config:rw

options:
  api_key: "changeme"
  dashboard_username: "admin"
  dashboard_password: "admin"
  session_name: "default"
  engine: "NOWEB"
  webhook_url: ""
  webhook_events: "message,session.status"
  log_level: "INFO"

schema:
  api_key: str
  dashboard_username: str
  dashboard_password: str
  session_name: str
  engine: list(NOWEB|WEBJS)
  webhook_url: str
  webhook_events: str
  log_level: list(INFO|DEBUG|ERROR|WARN)

panel_icon: "mdi:whatsapp"
panel_title: "WhatsApp"
